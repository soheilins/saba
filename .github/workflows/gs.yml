name: Copy Files from Range

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'GitHub directory link (e.g., https://github.com/owner/repo/tree/branch/path)'
        required: true
        type: string
      file_range:
        description: 'Range of files to copy (e.g., 1-5, 3-6)'
        required: true
        type: string

jobs:
  copy-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Parse source URL
        id: parse
        run: |
          URL="${{ github.event.inputs.source_url }}"
          if [[ $URL =~ https://github.com/([^/]+)/([^/]+)/tree/([^/]+)/(.*) ]]; then
            echo "owner=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "repo=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
            echo "branch=${BASH_REMATCH[3]}" >> $GITHUB_OUTPUT
            echo "path=${BASH_REMATCH[4]}" >> $GITHUB_OUTPUT
          else
            echo "Invalid GitHub directory URL"
            exit 1
          fi

      - name: Get file list from source directory using gh
        id: files
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          OWNER="${{ steps.parse.outputs.owner }}"
          REPO="${{ steps.parse.outputs.repo }}"
          BRANCH="${{ steps.parse.outputs.branch }}"
          PATH="${{ steps.parse.outputs.path }}"

          # Use gh api to get directory contents
          RESPONSE=$(gh api "repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}")
          
          # Filter only files, sort by name
          FILES=$(echo "$RESPONSE" | jq -r '.[] | select(.type == "file") | .name' | sort)
          if [ -z "$FILES" ]; then
            echo "No files found in the source directory."
            exit 1
          fi
          
          echo "$FILES" > file_list.txt
          echo "file_count=$(echo "$FILES" | wc -l)" >> $GITHUB_OUTPUT

      - name: Select files by range
        id: select
        run: |
          RANGE="${{ github.event.inputs.file_range }}"
          TOTAL=$(cat file_list.txt | wc -l)

          if [[ $RANGE =~ ^([0-9]+)-([0-9]+)$ ]]; then
            START=${BASH_REMATCH[1]}
            END=${BASH_REMATCH[2]}
          else
            echo "Invalid range format. Use e.g., 1-5"
            exit 1
          fi

          if [ $START -lt 1 ] || [ $END -gt $TOTAL ] || [ $START -gt $END ]; then
            echo "Range $START-$END is invalid (total files: $TOTAL)"
            exit 1
          fi

          SELECTED_FILES=$(cat file_list.txt | sed -n "${START},${END}p")
          if [ -z "$SELECTED_FILES" ]; then
            echo "No files selected in range."
            exit 1
          fi

          echo "selected_files<<EOF" >> $GITHUB_OUTPUT
          echo "$SELECTED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download and commit selected files
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          OWNER="${{ steps.parse.outputs.owner }}"
          REPO="${{ steps.parse.outputs.repo }}"
          BRANCH="${{ steps.parse.outputs.branch }}"
          PATH="${{ steps.parse.outputs.path }}"
          SELECTED="${{ steps.select.outputs.selected_files }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r filename; do
            echo "Downloading: $filename"
            # Get the download URL via gh API
            DOWNLOAD_URL=$(gh api "repos/${OWNER}/${REPO}/contents/${PATH}/${filename}?ref=${BRANCH}" --jq '.download_url')
            if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" = "null" ]; then
              echo "Failed to get download URL for $filename"
              exit 1
            fi
            # Use wget (available on runner) or gh release download, but wget is fine
            wget -q -O "$filename" "$DOWNLOAD_URL"
          done <<< "$SELECTED"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            RANGE="${{ github.event.inputs.file_range }}"
            git commit -m "Copy files $RANGE from $OWNER/$REPO:$PATH"
            git push origin HEAD:${{ github.ref_name }}
          fi
