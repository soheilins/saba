name: Copy Files from Range (No Git)

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'GitHub directory link (e.g., https://github.com/owner/repo/tree/branch/path)'
        required: true
        type: string
      file_range:
        description: 'Range of files to copy (e.g., 1-5, 3-6)'
        required: true
        type: string

jobs:
  copy-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Copy and commit files using Python (no git)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          SOURCE_URL: ${{ github.event.inputs.source_url }}
          FILE_RANGE: ${{ github.event.inputs.file_range }}
          TARGET_REPO: ${{ github.repository }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          python3 << 'EOF'
          import os
          import re
          import urllib.request
          import json
          import base64

          source_url = os.environ['SOURCE_URL']
          file_range = os.environ['FILE_RANGE']
          target_repo = os.environ['TARGET_REPO']
          target_branch = os.environ['TARGET_BRANCH']
          token = os.environ['GH_TOKEN']

          # Parse source GitHub URL
          match = re.match(r'https://github.com/([^/]+)/([^/]+)/tree/([^/]+)/(.*)', source_url)
          if not match:
              raise ValueError("Invalid source URL format")
          src_owner, src_repo, src_branch, src_path = match.groups()

          # Parse range
          range_match = re.match(r'(\d+)-(\d+)', file_range)
          if not range_match:
              raise ValueError("Invalid range format. Use e.g., 1-5")
          start, end = int(range_match.group(1)), int(range_match.group(2))

          # Helper to make API requests
          def api_request(url, method='GET', data=None):
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'token {token}')
              req.add_header('User-Agent', 'GitHub-Action')
              if data:
                  req.add_header('Content-Type', 'application/json')
                  data_bytes = json.dumps(data).encode()
                  req.method = method
                  return urllib.request.urlopen(req, data=data_bytes)
              else:
                  req.method = method
                  return urllib.request.urlopen(req)

          # Step 1: Get file list from source directory
          src_api_url = f"https://api.github.com/repos/{src_owner}/{src_repo}/contents/{src_path}?ref={src_branch}"
          with api_request(src_api_url) as resp:
              contents = json.loads(resp.read().decode())
          files = [item['name'] for item in contents if item.get('type') == 'file']
          files.sort()

          total = len(files)
          if start < 1 or end > total or start > end:
              raise ValueError(f"Range {start}-{end} invalid. Total files: {total}")
          selected = files[start-1:end]
          print(f"Selected files: {', '.join(selected)}")

          # Step 2: Download content of each selected file
          downloaded = []
          for filename in selected:
              file_api_url = f"https://api.github.com/repos/{src_owner}/{src_repo}/contents/{src_path}/{filename}?ref={src_branch}"
              with api_request(file_api_url) as resp:
                  file_info = json.loads(resp.read().decode())
              download_url = file_info['download_url']
              with urllib.request.urlopen(download_url) as raw:
                  content = raw.read()
              downloaded.append((filename, content))

          # Step 3: For each file, create or update in target repo inside "stream" folder
          for filename, content in downloaded:
              target_path = f"stream/{filename}"
              encoded = base64.b64encode(content).decode()
              target_api_url = f"https://api.github.com/repos/{target_repo}/contents/{target_path}?ref={target_branch}"
              sha = None
              try:
                  with api_request(target_api_url) as resp:
                      existing = json.loads(resp.read().decode())
                      sha = existing['sha']
                  print(f"Updating existing file: {target_path}")
              except urllib.error.HTTPError as e:
                  if e.code == 404:
                      print(f"Creating new file: {target_path}")
                  else:
                      raise

              payload = {
                  'message': f'Copy file {filename} from {src_owner}/{src_repo}:{src_path}',
                  'content': encoded,
                  'branch': target_branch
              }
              if sha:
                  payload['sha'] = sha

              with api_request(target_api_url, method='PUT', data=payload) as resp:
                  print(f"Committed {target_path}")
          EOF
