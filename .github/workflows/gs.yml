name: Copy Files from Range

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'GitHub directory link (e.g., https://github.com/owner/repo/tree/branch/path)'
        required: true
        type: string
      file_range:
        description: 'Range of files to copy (e.g., 1-5, 3-6)'
        required: true
        type: string

jobs:
  copy-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Copy files using Python
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import re
          import urllib.request
          import json
          import subprocess
          import sys

          source_url = os.environ['INPUT_SOURCE_URL']
          file_range = os.environ['INPUT_FILE_RANGE']

          # Parse GitHub URL
          match = re.match(r'https://github.com/([^/]+)/([^/]+)/tree/([^/]+)/(.*)', source_url)
          if not match:
              print("Invalid URL format")
              sys.exit(1)
          owner, repo, branch, path = match.groups()

          # Parse range (e.g., "1-5", "3-6")
          range_match = re.match(r'(\d+)-(\d+)', file_range)
          if not range_match:
              print("Invalid range format. Use e.g., 1-5")
              sys.exit(1)
          start, end = int(range_match.group(1)), int(range_match.group(2))

          # Get file list from GitHub API
          api_url = f"https://api.github.com/repos/{owner}/{repo}/contents/{path}?ref={branch}"
          req = urllib.request.Request(api_url)
          req.add_header('Authorization', f'token {os.environ["GH_TOKEN"]}')
          req.add_header('User-Agent', 'GitHub-Action')
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
          except Exception as e:
              print(f"Failed to fetch directory: {e}")
              sys.exit(1)

          files = [item['name'] for item in data if item.get('type') == 'file']
          files.sort()

          total = len(files)
          if start < 1 or end > total or start > end:
              print(f"Range {start}-{end} invalid. Total files: {total}")
              sys.exit(1)

          selected = files[start-1:end]
          print(f"Selected {len(selected)} files: {', '.join(selected)}")

          # Download each file
          for filename in selected:
              print(f"Downloading: {filename}")
              file_api_url = f"https://api.github.com/repos/{owner}/{repo}/contents/{path}/{filename}?ref={branch}"
              req = urllib.request.Request(file_api_url)
              req.add_header('Authorization', f'token {os.environ["GH_TOKEN"]}')
              req.add_header('User-Agent', 'GitHub-Action')
              with urllib.request.urlopen(req) as response:
                  file_data = json.loads(response.read().decode())
                  download_url = file_data['download_url']
                  urllib.request.urlretrieve(download_url, filename)

          # Git operations
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email', 'github-actions[bot]@users.noreply.github.com'], check=True)
          subprocess.run(['git', 'add', '.'], check=True)
          
          # Check if there are changes
          result = subprocess.run(['git', 'diff', '--cached', '--quiet'], check=False)
          if result.returncode != 0:
              commit_msg = f"Copy files {file_range} from {owner}/{repo}:{path}"
              subprocess.run(['git', 'commit', '-m', commit_msg], check=True)
              subprocess.run(['git', 'push', 'origin', 'HEAD'], check=True)
              print("Commit pushed successfully")
          else:
              print("No changes to commit")
          PYTHON_SCRIPT
        env:
          INPUT_SOURCE_URL: ${{ github.event.inputs.source_url }}
          INPUT_FILE_RANGE: ${{ github.event.inputs.file_range }}
