name: Copy Files from Range

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'GitHub directory link (e.g., https://github.com/owner/repo/tree/branch/path)'
        required: true
        type: string
      file_range:
        description: 'Range of files to copy (e.g., 1-5, 3-6)'
        required: true
        type: string

jobs:
  copy-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Parse source URL
        id: parse
        run: |
          URL="${{ github.event.inputs.source_url }}"
          if [[ $URL =~ https://github.com/([^/]+)/([^/]+)/tree/([^/]+)/(.*) ]]; then
            echo "owner=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "repo=${BASH_REMATCH[2]}" >> $GITHUB_OUTPUT
            echo "branch=${BASH_REMATCH[3]}" >> $GITHUB_OUTPUT
            echo "path=${BASH_REMATCH[4]}" >> $GITHUB_OUTPUT
          else
            echo "Invalid GitHub directory URL"
            exit 1
          fi

      - name: Clone source repository (sparse checkout)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          OWNER="${{ steps.parse.outputs.owner }}"
          REPO="${{ steps.parse.outputs.repo }}"
          BRANCH="${{ steps.parse.outputs.branch }}"
          PATH="${{ steps.parse.outputs.path }}"
          
          # Sparse clone: only the needed directory
          git clone --depth 1 --filter=blob:none --no-checkout \
            https://x-access-token:${GH_TOKEN}@github.com/${OWNER}/${REPO}.git source_repo
          cd source_repo
          git sparse-checkout init --cone
          git sparse-checkout set "$PATH"
          git checkout $BRANCH
          cd ..
          
          # List files alphabetically
          if [ -d "source_repo/$PATH" ]; then
            ls -1 "source_repo/$PATH" | sort > file_list.txt
          else
            echo "Directory not found after checkout"
            exit 1
          fi

      - name: Select files by range
        id: select
        run: |
          RANGE="${{ github.event.inputs.file_range }}"
          TOTAL=$(cat file_list.txt | wc -l)
          if [[ $RANGE =~ ^([0-9]+)-([0-9]+)$ ]]; then
            START=${BASH_REMATCH[1]}
            END=${BASH_REMATCH[2]}
          else
            echo "Invalid range format. Use e.g., 1-5"
            exit 1
          fi
          if [ $START -lt 1 ] || [ $END -gt $TOTAL ] || [ $START -gt $END ]; then
            echo "Range $START-$END is invalid (total files: $TOTAL)"
            exit 1
          fi
          SELECTED_FILES=$(cat file_list.txt | sed -n "${START},${END}p")
          echo "selected_files<<EOF" >> $GITHUB_OUTPUT
          echo "$SELECTED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Copy selected files to target repo and commit
        run: |
          PATH="${{ steps.parse.outputs.path }}"
          SELECTED="${{ steps.select.outputs.selected_files }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          while IFS= read -r filename; do
            echo "Copying: $filename"
            cp "source_repo/$PATH/$filename" .
          done <<< "$SELECTED"
          
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            RANGE="${{ github.event.inputs.file_range }}"
            git commit -m "Copy files $RANGE from ${{ steps.parse.outputs.owner }}/${{ steps.parse.outputs.repo }}:$PATH"
            git push origin HEAD:${{ github.ref_name }}
          fi
          
          rm -rf source_repo
